name: Create manual database backup

on:
  workflow_dispatch:
    inputs:
      operation_id:
        description: Operation UUID created by the API
        required: true
        type: string
      operation_key:
        description: Private R2 operation metadata key
        required: true
        type: string
      period:
        description: Asia/Manila quota period (YYYY-MM)
        required: true
        type: string

run-name: Manual database backup (${{ inputs.operation_id }})

permissions:
  contents: read

concurrency:
  group: production-testing-database-maintenance
  cancel-in-progress: false

jobs:
  backup:
    name: Create verified R2 backup
    runs-on: ubuntu-latest
    environment: production-testing
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: auto
      AWS_EC2_METADATA_DISABLED: true
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_BUCKET: ${{ secrets.R2_BUCKET }}
      OPERATION_ID: ${{ inputs.operation_id }}
      OPERATION_KEY: ${{ inputs.operation_key }}
      PERIOD: ${{ inputs.period }}
      MANUAL_MONTHLY_LIMIT: 5
      MANUAL_STORAGE_LIMIT: 5
    steps:
      - name: Validate request and mark operation running
        run: |
          set -euo pipefail
          [[ "$OPERATION_ID" =~ ^[0-9a-fA-F-]{36}$ ]]
          [[ "$PERIOD" =~ ^[0-9]{4}-[0-9]{2}$ ]]
          [[ "$OPERATION_KEY" == "database/operations/$PERIOD/$OPERATION_ID.json" ]]
          R2_ENDPOINT="https://$R2_ACCOUNT_ID.r2.cloudflarestorage.com"
          printf 'R2_ENDPOINT=%s\n' "$R2_ENDPOINT" >> "$GITHUB_ENV"
          aws --endpoint-url "$R2_ENDPOINT" s3 cp "s3://$R2_BUCKET/$OPERATION_KEY" "$RUNNER_TEMP/operation.json"
          jq \
            --arg started_at "$(date -u +'%Y-%m-%dT%H:%M:%SZ')" \
            --arg run_url "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" \
            '.status = "in_progress" | .message = "Backup is running." | .started_at = $started_at | .updated_at = $started_at | .run_url = $run_url' \
            "$RUNNER_TEMP/operation.json" > "$RUNNER_TEMP/operation-running.json"
          mv "$RUNNER_TEMP/operation-running.json" "$RUNNER_TEMP/operation.json"
          aws --endpoint-url "$R2_ENDPOINT" s3 cp "$RUNNER_TEMP/operation.json" "s3://$R2_BUCKET/$OPERATION_KEY" --content-type application/json

      - name: Enforce monthly and storage limits
        run: |
          set -euo pipefail
          USAGE_KEY="database/control/usage-$PERIOD.json"
          if ! aws --endpoint-url "$R2_ENDPOINT" s3 cp "s3://$R2_BUCKET/$USAGE_KEY" "$RUNNER_TEMP/usage.json"; then
            jq -n --arg period "$PERIOD" '{period: $period, manual_backups: 0, restores: 0}' > "$RUNNER_TEMP/usage.json"
          fi
          USED="$(jq -r '.manual_backups // 0' "$RUNNER_TEMP/usage.json")"
          [[ "$USED" -lt "$MANUAL_MONTHLY_LIMIT" ]] || { echo 'Monthly manual backup limit reached.' >&2; exit 1; }
          aws --endpoint-url "$R2_ENDPOINT" s3api list-objects-v2 \
            --bucket "$R2_BUCKET" --prefix database/manual/ > "$RUNNER_TEMP/manual-objects.json"
          STORED="$(jq '[.Contents[]? | select(.Key | endswith(".dump"))] | length' "$RUNNER_TEMP/manual-objects.json")"
          [[ "$STORED" -lt "$MANUAL_STORAGE_LIMIT" ]] || { echo 'Stored manual backup limit reached.' >&2; exit 1; }

      - name: Create and validate PostgreSQL dump
        run: |
          set -euo pipefail
          BACKUP_NAME="backup-$(date -u +'%Y-%m-%d_%H-%M-%S').dump"
          BACKUP_KEY="database/manual/$BACKUP_NAME"
          printf 'BACKUP_NAME=%s\nBACKUP_KEY=%s\n' "$BACKUP_NAME" "$BACKUP_KEY" >> "$GITHUB_ENV"
          docker run --rm \
            -e DATABASE_URL="$SUPABASE_DB_URL" \
            -e BACKUP_NAME="$BACKUP_NAME" \
            -v "$RUNNER_TEMP:/backup" \
            postgres:17 \
            sh -ceu 'pg_dump "$DATABASE_URL" --schema=public --format=custom --no-owner --no-privileges --file="/backup/$BACKUP_NAME"; pg_restore --list "/backup/$BACKUP_NAME" >/dev/null'
          SHA256="$(sha256sum "$RUNNER_TEMP/$BACKUP_NAME" | cut -d ' ' -f1)"
          SIZE_BYTES="$(stat -c '%s' "$RUNNER_TEMP/$BACKUP_NAME")"
          CREATED_AT="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          jq -n \
            --arg key "$BACKUP_KEY" \
            --arg filename "$BACKUP_NAME" \
            --arg type manual \
            --arg sha256 "$SHA256" \
            --arg created_at "$CREATED_AT" \
            --argjson size_bytes "$SIZE_BYTES" \
            '{key: $key, filename: $filename, type: $type, size_bytes: $size_bytes, created_at: $created_at, sha256: $sha256, verified: true, format: "PostgreSQL custom dump"}' \
            > "$RUNNER_TEMP/$BACKUP_NAME.json"

      - name: Upload verified backup to private R2
        run: |
          set -euo pipefail
          aws --endpoint-url "$R2_ENDPOINT" s3 cp "$RUNNER_TEMP/$BACKUP_NAME" "s3://$R2_BUCKET/$BACKUP_KEY" --content-type application/octet-stream
          aws --endpoint-url "$R2_ENDPOINT" s3 cp "$RUNNER_TEMP/$BACKUP_NAME.json" "s3://$R2_BUCKET/$BACKUP_KEY.json" --content-type application/json

      - name: Record successful monthly usage
        run: |
          set -euo pipefail
          USAGE_KEY="database/control/usage-$PERIOD.json"
          RECORDED_AT="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          jq --arg updated_at "$RECORDED_AT" '.manual_backups = ((.manual_backups // 0) + 1) | .restores = (.restores // 0) | .updated_at = $updated_at' \
            "$RUNNER_TEMP/usage.json" > "$RUNNER_TEMP/usage-updated.json"
          aws --endpoint-url "$R2_ENDPOINT" s3 cp "$RUNNER_TEMP/usage-updated.json" "s3://$R2_BUCKET/$USAGE_KEY" --content-type application/json

      - name: Remove partial backup after failure
        if: failure() && env.BACKUP_KEY != ''
        run: |
          aws --endpoint-url "$R2_ENDPOINT" s3 rm "s3://$R2_BUCKET/$BACKUP_KEY" || true
          aws --endpoint-url "$R2_ENDPOINT" s3 rm "s3://$R2_BUCKET/$BACKUP_KEY.json" || true

      - name: Publish operation result
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
        run: |
          set -euo pipefail
          R2_ENDPOINT="${R2_ENDPOINT:-https://$R2_ACCOUNT_ID.r2.cloudflarestorage.com}"
          if ! aws --endpoint-url "$R2_ENDPOINT" s3 cp "s3://$R2_BUCKET/$OPERATION_KEY" "$RUNNER_TEMP/operation-final.json"; then
            exit 0
          fi
          FINISHED_AT="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          if [[ "$JOB_STATUS" == "success" ]]; then
            STATUS=succeeded
            MESSAGE='Backup completed and was verified.'
          else
            STATUS=failed
            MESSAGE='Backup failed. Open the technical details or contact your system administrator.'
          fi
          jq \
            --arg status "$STATUS" \
            --arg message "$MESSAGE" \
            --arg finished_at "$FINISHED_AT" \
            --arg backup_key "${BACKUP_KEY:-}" \
            --arg filename "${BACKUP_NAME:-}" \
            --arg run_url "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" \
            '.status = $status | .message = $message | .finished_at = $finished_at | .updated_at = $finished_at | .run_url = $run_url | if $backup_key != "" then .backup_key = $backup_key | .filename = $filename else . end' \
            "$RUNNER_TEMP/operation-final.json" > "$RUNNER_TEMP/operation-result.json"
          aws --endpoint-url "$R2_ENDPOINT" s3 cp "$RUNNER_TEMP/operation-result.json" "s3://$R2_BUCKET/$OPERATION_KEY" --content-type application/json
